<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Hospitalar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
    <h2>🏥 Hospital</h2>
    <ul>
        <li onclick="mostrarDashboard()">Dashboard</li>
        <li onclick="mostrarCadastro()">Cadastro</li>
    </ul>
</div>
<div class="main">
    <div id="dashboard" class="page">
        <h1>Dashboard</h1>
        <div class="cards">
            <div class="card">
                <h3>Total Profissionais</h3>
                <p id="totalProfissionais">0</p>
            </div>
            <div class="card">
                <h3>Médicos(a)</h3>
                <p id="totalMedicos">0</p>
            </div>
            <div class="card">
                <h3>Enfermeiros(a)</h3>
                <p id="totalEnfermeiros">0</p>
            </div>
        </div>
    </div>
    <div id="cadastro" class="page" style="display:none;">
        <h1>Cadastro de Profissionais</h1>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Nome Completo" required>

            <select id="cargo" required>
                <option value="">Selecione o Cargo</option>
                <option value="Médico">Médico(a)</option>
                <option value="Enfermeiro">Enfermeiro(a)</option>
            </select>
            <input type="text" id="registro" placeholder="CRM / COREN" required>
            <input type="text" id="especialidade" placeholder="Especialidade" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="telefone" placeholder="Telefone" required>
            <button type="submit">Cadastrar</button>
        </form>
        <h2>Lista de Profissionais</h2>
        <select id="filtro" onchange="filtrar()">
            <option value="Todos">Todos</option>
            <option value="Médico">Médicos(a)</option>
            <option value="Enfermeiro">Enfermeiros(a)</option>
        </select>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>Registro</th>
                    <th>Especialidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
