        <path d="M11.5 3.5H15a1.5 1.5 0 0 1 1.06.44l5 5a1.5 1.5 0 0 1 0 2.12l-5.5 5.5a1.5 1.5 0 0 1-2.12 0l-5-5A1.5 1.5 0 0 1 8 10.5V7"/>
        <circle cx="14" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        <!-- tag da frente -->
        <path d="M7.5 2.5H11a1.5 1.5 0 0 1 1.06.44l5 5a1.5 1.5 0 0 1 0 2.12l-5.5 5.5a1.5 1.5 0 0 1-2.12 0l-5-5A1.5 1.5 0 0 1 4 9.5V6a1.5 1.5 0 0 1 1.5-1.5h2z"/>
        <circle cx="7.5" cy="6" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Pacientes
    </div>
    <!-- Dois perfis de pessoas -->
    <div class="nav-item" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <!-- pessoa da frente -->
        <circle cx="9" cy="7" r="3"/>
        <path d="M2 21v-1a7 7 0 0 1 7-7v0a7 7 0 0 1 7 7v1"/>
        <!-- pessoa atrás (direita, menor) -->
        <circle cx="17" cy="7" r="2.5"/>
        <path d="M22 21v-1a5 5 0 0 0-5-5"/>
      </svg>
      Profissionais
    </div>
    <!-- Cartão com engrenagem sobreposta no canto inferior direito -->
    <div class="nav-item" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <!-- câmera de trás -->
        <rect x="2" y="7" width="16" height="12" rx="2"/>
        <circle cx="10" cy="13" r="3"/>
        <path d="M6 7V6a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v1"/>
        <!-- câmera da frente (sobreposta, deslocada) -->
        <rect x="6" y="4" width="16" height="12" rx="2"/>
        <circle cx="14" cy="10" r="3"/>
        <path d="M10 4V3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v1"/>
      </svg>
      Planos de Saúde
    </div>
    <!-- Avião inclinado -->
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-airplane" style="transform: rotate(45deg); display:inline-block;"></i> Urgência
      <i class="bi bi-chevron-down nav-arrow"></i>
    </div>
  </nav>
</aside>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-btn notif-dot" title="Notificações">
    <i class="bi bi-bell"></i>
  </div>
  <div class="topbar-btn" title="Perfil">
    <i class="bi bi-person-circle"></i>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <div class="page-header">
    <h1 class="page-title">Faturamento</h1>
  </div>

  <!-- FILTROS -->
  <div class="filter-bar">
    <div class="search-input-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar paciente…" oninput="renderTable()" />
    </div>

    <div class="select-wrap">
      <i class="bi bi-calendar3"></i>
      <select id="dateStart" onchange="renderTable()">
        <option value="">Data Inicial</option>
        <option value="2024-04-10">10/04/2024</option>
        <option value="2024-04-08">08/04/2024</option>
        <option value="2024-04-05">05/04/2024</option>
        <option value="2024-04-02">02/04/2024</option>
      </select>
    </div>

    <div class="select-wrap">
      <i class="bi bi-calendar3"></i>
      <select id="dateEnd" onchange="renderTable()">
        <option value="">Data Final</option>
        <option value="2024-04-10">10/04/2024</option>
        <option value="2024-04-08">08/04/2024</option>
        <option value="2024-04-05">05/04/2024</option>
        <option value="2024-04-02">02/04/2024</option>
      </select>
    </div>

    <select id="statusFilter" class="status-select" onchange="renderTable()">
      <option value="">Status</option>
      <option value="Pendente">Pendente</option>
      <option value="Pago">Pago</option>
      <option value="Cancelado">Cancelado</option>
    </select>

    <button class="btn-filter" onclick="renderTable()">Filtrar</button>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-row">
    <div class="kpi-card pending">
      <div class="kpi-label">Pendentes</div>
      <div class="kpi-value" id="kpiPending">R$ 0,00</div>
    </div>
    <div class="kpi-card paid">
      <div class="kpi-label">Pagos</div>
      <div class="kpi-value" id="kpiPaid">R$ 0,00</div>
    </div>
    <div class="kpi-card canceled">
      <div class="kpi-label">Cancelados</div>
      <div class="kpi-value" id="kpiCanceled">R$ 0,00</div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('paciente')">Paciente <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('data')">Data <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('convenio')">Convênio <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('valor')">Valor <i class="bi bi-arrow-down-up"></i></th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</main>

<!-- FOOTER -->
<div class="footer-bar">
  <button class="btn-primary" onclick="openModal()">
    <i class="bi bi-plus-lg"></i> Nova Fatura
  </button>
  <button class="btn-secondary" onclick="gerarRelatorio()">
    <i class="bi bi-download"></i> Gerar Relatório
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nova Fatura</span>
      <button class="modal-close" onclick="closeModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label" for="formPaciente">Paciente</label>
      <input type="text" class="form-control" id="formPaciente" placeholder="Nome do paciente" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formData">Data</label>
      <input type="date" class="form-control" id="formData" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formConvenio">Convênio</label>
      <select class="form-control" id="formConvenio">
        <option value="Particular">Particular</option>
        <option value="Unimed">Unimed</option>
        <option value="Amil">Amil</option>
        <option value="Bradesco Saúde">Bradesco Saúde</option>
        <option value="SulAmérica">SulAmérica</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="formValor">Valor (R$)</label>
      <input type="number" class="form-control" id="formValor" placeholder="0,00" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formStatus">Status</label>
      <select class="form-control" id="formStatus">
        <option value="Pendente">Pendente</option>
        <option value="Pago">Pago</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveFatura()">
        <i class="bi bi-check-lg"></i> Salvar
      </button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="script.js"></script>
</body>
</html>
