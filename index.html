<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teksystem — Faturamento</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <i class="bi bi-grid-fill logo-icon"></i>
    <span class="logo-text">Teksystem</span>
  </div>

  <nav class="nav-section">
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-speedometer2"></i> Dashboard
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-person"></i> Pacientes
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-people"></i> Profissionais
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-calendar3"></i> Agenda
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-clipboard2-pulse"></i> Atendimentos
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-shield-check"></i> Convênios
    </div>
    <div class="nav-item active" onclick="setNav(this)">
      <i class="bi bi-credit-card"></i> Faturamento
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-bar-chart-line"></i> Relatórios
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <i class="bi bi-gear"></i> Configurações
    </div>
  </nav>
</aside>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-btn notif-dot" title="Notificações">
    <i class="bi bi-bell"></i>
  </div>
  <div class="topbar-btn" title="Perfil">
    <i class="bi bi-person-circle"></i>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <div class="page-header">
    <h1 class="page-title">Faturamento</h1>
  </div>

  <!-- FILTROS -->
  <div class="filter-bar">
    <div class="search-input-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar paciente…" oninput="renderTable()" />
    </div>

    <div class="select-wrap">
      <i class="bi bi-calendar3"></i>
      <select id="dateStart" onchange="renderTable()">
        <option value="">Data Inicial</option>
        <option value="2024-04-10">10/04/2024</option>
        <option value="2024-04-08">08/04/2024</option>
        <option value="2024-04-05">05/04/2024</option>
        <option value="2024-04-02">02/04/2024</option>
      </select>
    </div>

    <div class="select-wrap">
      <i class="bi bi-calendar3"></i>
      <select id="dateEnd" onchange="renderTable()">
        <option value="">Data Final</option>
        <option value="2024-04-10">10/04/2024</option>
        <option value="2024-04-08">08/04/2024</option>
        <option value="2024-04-05">05/04/2024</option>
        <option value="2024-04-02">02/04/2024</option>
      </select>
    </div>

    <select id="statusFilter" class="status-select" onchange="renderTable()">
      <option value="">Status</option>
      <option value="Pendente">Pendente</option>
      <option value="Pago">Pago</option>
      <option value="Cancelado">Cancelado</option>
    </select>

    <button class="btn-filter" onclick="renderTable()">Filtrar</button>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-row">
    <div class="kpi-card pending">
      <div class="kpi-label">Pendentes</div>
      <div class="kpi-value" id="kpiPending">R$ 0,00</div>
    </div>
    <div class="kpi-card paid">
      <div class="kpi-label">Pagos</div>
      <div class="kpi-value" id="kpiPaid">R$ 0,00</div>
    </div>
    <div class="kpi-card canceled">
      <div class="kpi-label">Cancelados</div>
      <div class="kpi-value" id="kpiCanceled">R$ 0,00</div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('paciente')">Paciente <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('data')">Data <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('convenio')">Convênio <i class="bi bi-arrow-down-up"></i></th>
          <th onclick="sortBy('valor')">Valor <i class="bi bi-arrow-down-up"></i></th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</main>

<!-- FOOTER -->
<div class="footer-bar">
  <button class="btn-primary" onclick="openModal()">
    <i class="bi bi-plus-lg"></i> Nova Fatura
  </button>
  <button class="btn-secondary" onclick="gerarRelatorio()">
    <i class="bi bi-download"></i> Gerar Relatório
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nova Fatura</span>
      <button class="modal-close" onclick="closeModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label" for="formPaciente">Paciente</label>
      <input type="text" class="form-control" id="formPaciente" placeholder="Nome do paciente" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formData">Data</label>
      <input type="date" class="form-control" id="formData" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formConvenio">Convênio</label>
      <select class="form-control" id="formConvenio">
        <option value="Particular">Particular</option>
        <option value="Unimed">Unimed</option>
        <option value="Amil">Amil</option>
        <option value="Bradesco Saúde">Bradesco Saúde</option>
        <option value="SulAmérica">SulAmérica</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="formValor">Valor (R$)</label>
      <input type="number" class="form-control" id="formValor" placeholder="0,00" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label class="form-label" for="formStatus">Status</label>
      <select class="form-control" id="formStatus">
        <option value="Pendente">Pendente</option>
        <option value="Pago">Pago</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveFatura()">
        <i class="bi bi-check-lg"></i> Salvar
      </button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="script.js"></script>
</body>
</html>
